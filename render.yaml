services:
  - type: web
    name: artfolio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DB_NAME
        value: artfolio
      - key: ADMIN_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health